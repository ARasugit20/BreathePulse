services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: breathepulse
      POSTGRES_PASSWORD: breathepulse
      POSTGRES_DB: breathepulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breathepulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://breathepulse:breathepulse@postgres:5432/breathepulse
      DATABASE_URL_SYNC: postgresql://breathepulse:breathepulse@postgres:5432/breathepulse
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
